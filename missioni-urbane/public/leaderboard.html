<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classifica - Agenzia Missioni Urbane</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    .rank-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    .rank-table th, .rank-table td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .rank-table th {
      color: var(--text-muted);
      font-family: var(--font-display);
      text-transform: uppercase;
      font-size: 0.85rem;
    }
    .rank-table tr:nth-child(1) td {
      color: var(--accent-amber);
      font-weight: bold;
      font-size: 1.2rem;
    }
    .rank-table tr:nth-child(2) td {
      color: #c0c0c0;
      font-weight: bold;
      font-size: 1.1rem;
    }
    .rank-table tr:nth-child(3) td {
      color: #cd7f32;
      font-weight: bold;
      font-size: 1.05rem;
    }
    .rank-table tbody tr {
      transition: background 0.3s ease;
    }
    .rank-table tbody tr:hover {
      background: var(--bg-elevated);
    }
  </style>
</head>
<body>
  <header>
    <div class="container header-content">
      <div class="logo">
        AMU
      </div>
      <nav>
        <ul id="main-nav"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div style="max-width: 800px; margin: 0 auto;">
      <h1 class="mb-2 text-green text-center">Chi comanda.</h1>
      <p class="text-center text-muted mb-4">Aggiornata in tempo reale</p>
      
      <div id="update-indicator" class="text-center text-amber mb-2" style="font-size: 0.8rem; display: none;">
        Classifica aggiornata in tempo reale!
      </div>
      
      <div class="card" style="padding: 0;">
        <div class="table-responsive">
          <table style="width: 100%; border-collapse: collapse;">
            <thead>
              <tr style="border-bottom: 1px solid var(--border);">
                <th style="padding: 15px; text-align: left;">POS</th>
                <th style="padding: 15px; text-align: left;">AGENTE</th>
                <th style="padding: 15px; text-align: right;">PT</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body">
              <tr><td colspan="3" class="text-center text-muted" style="padding: 20px;">Caricamento...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/leaderboard.js"></script>

  <footer class="container">
    <div>AMU &mdash; Roma, 2025</div>
    <div>Progetto universitario</div>
  </footer>
</body>
</html>
