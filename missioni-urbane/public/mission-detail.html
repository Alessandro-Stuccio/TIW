<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dettaglio Missione - Agenzia Missioni Urbane</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>

<body>
  <header>
    <div class="container header-content">
      <div class="logo">
        AMU
      </div>
      <nav>
        <ul id="main-nav"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div id="alert-container"></div>
    <div id="mission-content" class="card" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <h1 id="m-title" class="text-green mb-2"></h1>
        <div id="m-points" class="text-amber" style="font-size: 1.5rem; font-weight: bold;"></div>
      </div>

      <div class="mb-3">
        <span id="m-difficulty" class="tag"></span>
        <span id="m-category" class="tag"></span>
      </div>

      <div class="mb-4">
        <h3 class="text-muted mb-1">Dettagli Operativi</h3>
        <p id="m-desc" style="font-size: 1.1rem; line-height: 1.8;"></p>
      </div>

      <div class="mb-4">
        <h3 class="text-muted mb-1">Luogo</h3>
        <p id="m-loc" class="text-primary"></p>
      </div>

      <div id="action-container" class="mt-4 pt-3" style="border-top: 1px solid var(--border);">
        <!-- Bottoni renderizzati in JS -->
      </div>
    </div>

    <div id="loading" class="text-center mt-4">
      <div style="background: var(--bg-surface); padding: 40px; border-radius: 4px; border: 1px solid var(--border);">
        <p style="color: #666;">Caricamento...</p>
      </div>
    </div>
  </main>

  <script type="module">
    import { fetchAPI, setupHeader, showAlert } from './js/api.js';

    let user = null;
    let missionId = null;

    document.addEventListener('DOMContentLoaded', async () => {
      user = await setupHeader();

      const urlParams = new URLSearchParams(window.location.search);
      missionId = urlParams.get('id');

      if (!missionId) {
        window.location.href = '/index.html';
        return;
      }

      await loadMission();
    });

    async function loadMission() {
      try {
        const data = await fetchAPI(`/missions/${missionId}`);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('mission-content').style.display = 'block';

        const m = data.mission;
        document.getElementById('m-title').textContent = m.title;
        document.getElementById('m-points').textContent = `+${m.points} PT`;
        document.getElementById('m-difficulty').textContent = m.difficulty;
        document.getElementById('m-difficulty').className = `tag tag-${m.difficulty}`;
        document.getElementById('m-category').textContent = m.category;
        document.getElementById('m-desc').textContent = m.description;
        document.getElementById('m-loc').textContent = m.location;

        renderActions(data.completion);
      } catch (err) {
        document.getElementById('loading').innerHTML = '<p class="text-red">Errore nel caricamento della missione.</p>';
      }
    }

    function renderActions(completion) {
      const container = document.getElementById('action-container');

      if (!user) {
        container.innerHTML = '<p class="text-muted">Devi <a href="/login.html">accedere</a> per accettare questa missione.</p>';
        return;
      }

      if (!completion) {
        if (user.role !== 'user') {
          container.innerHTML = '<p class="text-muted">Sei un admin/moderatore, non puoi accettare missioni.</p>';
        } else {
          const btn = document.createElement('button');
          btn.className = 'btn btn-primary';
          btn.textContent = 'Accetta Missione';
          btn.onclick = async () => {
            try {
              await fetchAPI(`/completions/missions/${missionId}/accept`, { method: 'POST' });
              window.location.reload();
            } catch (err) {
              showAlert('alert-container', err.message);
            }
          };
          container.appendChild(btn);
        }
      } else {
        const statusMap = {
          'accettata': { text: 'Missione in corso', color: 'var(--text-primary)' },
          'in_attesa': { text: 'Prova in verifica', color: 'var(--accent-amber)' },
          'completata': { text: 'Missione completata', color: 'var(--accent-green)' },
          'rifiutata': { text: 'Prova rifiutata', color: 'var(--accent-red)' }
        };

        const s = statusMap[completion.status];

        let html = `
          <div style="padding: 15px; border-left: 4px solid ${s.color}; background: var(--bg-elevated);">
            <h4 style="color: ${s.color}; margin-bottom: 5px;">Stato: ${s.text}</h4>
        `;

        if (completion.status === 'rifiutata' && completion.feedback) {
          html += `<p class="text-muted mb-2">Feedback: ${completion.feedback}</p>`;
        }

        html += `</div>`;

        container.innerHTML = html;

        if (completion.status === 'accettata' || completion.status === 'rifiutata') {
          const a = document.createElement('a');
          a.href = `/submit-proof.html?id=${missionId}`;
          a.className = 'btn btn-primary mt-3';
          a.textContent = 'Invia la prova';
          container.appendChild(a);
        }
      }
    }
  </script>
  <script type="module" src="/js/map.js"></script>

  <footer class="container">
    <div>AMU &mdash; Roma, 2025</div>
    <div>Progetto universitario</div>
  </footer>
</body>

</html>
