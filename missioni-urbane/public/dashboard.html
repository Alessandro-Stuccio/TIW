<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Agenzia Missioni Urbane</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>

<body>
  <header>
    <div class="container header-content">
      <div class="logo">
        AMU
      </div>
      <nav>
        <ul id="main-nav"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="grid grid-2 mb-4">
      <!-- Info Profilo -->
      <div class="card" id="profile-card">
        <h1 class="mb-4 text-green" id="dashboard-title">Il mio profilo</h1>
        <div id="p-info" class="mb-3">Caricamento...</div>
      </div>

      <!-- Badge -->
      <div class="card">
        <h2 class="card-title text-amber">Riconoscimenti</h2>
        <div id="badges-container" style="display: flex; gap: 15px; flex-wrap: wrap;">
          <!-- Badge renderizzati qui -->
        </div>
      </div>
    </div>

    <h2 class="mb-3">Storico Operazioni</h2>
    <div id="history-container" class="grid grid-3">
      <!-- Storico missioni renderizzato qui -->
    </div>
  </main>

  <script type="module">
    import { fetchAPI, setupHeader } from './js/api.js';

    document.addEventListener('DOMContentLoaded', async () => {
      const user = await setupHeader();
      if (!user) {
        window.location.href = '/login.html';
        return;
      }

      document.getElementById('dashboard-title').textContent = `Ciao, ${user.username}.`;
      await loadDashboardData(user.id);
    });

    async function loadDashboardData(userId) {
      try {
        const profileData = await fetchAPI(`/users/${userId}/profile`);
        const historyData = await fetchAPI('/completions/my');

        renderProfile(profileData.user);
        renderBadges(profileData.badges);
        renderHistory(historyData);
      } catch (err) {
        console.error('Errore caricamento dashboard', err);
      }
    }

    function renderProfile(user) {
      document.getElementById('p-info').innerHTML = `
        <p><strong>Nome in Codice:</strong> ${user.username}</p>
        <p><strong>Punteggio Attuale:</strong> <span class="text-amber" style="font-size: 1.2rem; font-weight: bold;">${user.points} PT</span></p>
        <p><strong>Ruolo:</strong> ${user.role.toUpperCase()}</p>
        <p><strong>Reclutato il:</strong> ${new Date(user.created_at).toLocaleDateString('it-IT')}</p>
      `;
    }

    function renderBadges(badges) {
      const container = document.getElementById('badges-container');
      if (badges.length === 0) {
        container.innerHTML = '<p class="text-muted">Nessun riconoscimento ottenuto finora.</p>';
        return;
      }

      container.innerHTML = badges.map(b => `
        <div class="text-center p-2" style="background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 4px; width: 100px;">
          <div style="font-size: 2rem; margin-bottom: 5px;">${b.icon}</div>
          <div style="font-size: 0.7rem; font-family: var(--font-display);">${b.name}</div>
        </div>
      `).join('');
    }

    function renderHistory(history) {
      const container = document.getElementById('history-container');
      if (history.length === 0) {
        container.innerHTML = '<p class="text-muted" style="grid-column: 1/-1;">Nessuna operazione in archivio.</p>';
        return;
      }

      const statusMap = {
        'accettata': { text: 'In Corso', color: 'var(--text-primary)' },
        'in_attesa': { text: 'In Verifica', color: 'var(--accent-amber)' },
        'completata': { text: 'Completata', color: 'var(--accent-green)' },
        'rifiutata': { text: 'Fallita', color: 'var(--accent-red)' }
      };

      container.innerHTML = history.map(c => {
        const s = statusMap[c.status];
        return `
          <div class="card">
            <h3 class="card-title" style="font-size: 1.1rem;">${c.title}</h3>
            <div style="color: ${s.color}; margin-bottom: 10px; font-weight: bold;">Stato: ${s.text}</div>
            <div class="text-muted" style="font-size: 0.85rem;">
              Ultimo agg: ${new Date(c.verified_at || c.accepted_at).toLocaleString('it-IT')}
            </div>
            <a href="/mission-detail.html?id=${c.mission_id}" class="btn btn-primary btn-block mt-2">Vedi Dettagli</a>
          </div>
        `;
      }).join('');
    }
  </script>

  <footer class="container">
    <div>AMU &mdash; Roma, 2025</div>
    <div>Progetto universitario</div>
  </footer>
</body>

</html>
