<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrazione - Agenzia Missioni Urbane</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <header>
    <div class="container header-content">
      <div class="logo">
        AMU
      </div>
      <nav>
        <ul id="main-nav"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div style="max-width: 400px; margin: 0 auto; margin-top: 50px;">
      <div class="card">
        <h2 class="card-title text-amber text-center mb-3">Unisciti all'agenzia.</h2>
        <div id="alert-container"></div>
        <form id="register-form">
          <div class="form-group">
            <label class="form-label">Nome in Codice</label>
            <input type="text" id="username" class="form-control" placeholder="Come vuoi chiamarti?" required minlength="3">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="La tua email" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="La tua password" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-block mb-2">Iscrivimi</button>
        </form>
        <div class="text-center" style="font-size: 0.8rem;">
          <span class="text-muted">Già un agente?</span> <a href="/login.html">Accedi</a>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { register, setupHeader, showAlert } from './js/api.js';

    document.addEventListener('DOMContentLoaded', async () => {
      const user = await setupHeader();
      if (user) {
        window.location.href = '/dashboard.html';
      }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = e.target.querySelector('button');

      try {
        btn.disabled = true;
        btn.textContent = 'Registrazione...';
        await register(username, email, password);
        window.location.href = '/dashboard.html';
      } catch (err) {
        showAlert('alert-container', err.message);
        btn.disabled = false;
        btn.textContent = 'Iscrivimi';
      }
    });
  </script>

  <footer class="container">
    <div>AMU &mdash; Roma, 2025</div>
    <div>Progetto universitario</div>
  </footer>
</body>
</html>
