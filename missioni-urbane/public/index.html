<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missioni - Agenzia Missioni Urbane</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    .filters {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      background: var(--bg-surface);
      padding: 15px;
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .filter-item {
      flex: 1;
    }

    /* Spazio per la mappa di Leaflet (Step 18) */
    #map-container {
      width: 100%;
      height: 400px;
      margin-bottom: 30px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      display: none;
      /* Verrà mostrata quando integrata */
    }
  </style>
</head>

<body>
  <header>
    <div class="container header-content">
      <div class="logo">
        AMU
      </div>
      <nav>
        <ul id="main-nav"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 class="mb-3 text-green">In campo questa settimana</h1>

    <div id="map-container"></div>

    <div class="filters">
      <div class="filter-item">
        <label class="form-label">Categoria</label>
        <select id="filter-category" class="form-control">
          <option value="">Tutte</option>
          <option value="esplorazione">Esplorazione</option>
          <option value="cultura">Cultura</option>
          <option value="fotografia">Fotografia</option>
          <option value="assurdità">Assurdità</option>
          <option value="utilità">Utilità</option>
        </select>
      </div>
      <div class="filter-item">
        <label class="form-label">Difficoltà</label>
        <select id="filter-difficulty" class="form-control">
          <option value="">Tutte</option>
          <option value="facile">Facile</option>
          <option value="media">Media</option>
          <option value="difficile">Difficile</option>
        </select>
      </div>
    </div>

    <div id="missions-grid" class="grid grid-3">
      <!-- Le missioni verranno caricate qui -->
    </div>
  </main>

  <script type="module">
    import { fetchAPI, setupHeader } from './js/api.js';

    let user = null;

    async function loadMissions() {
      const category = document.getElementById('filter-category').value;
      const difficulty = document.getElementById('filter-difficulty').value;

      let url = '/missions?';
      if (category) url += `category=${category}&`;
      if (difficulty) url += `difficulty=${difficulty}`;

      try {
        const missions = await fetchAPI(url);
        renderMissions(missions);

        // Custom event per notificare la mappa se è caricata
        document.dispatchEvent(new CustomEvent('missionsLoaded', { detail: missions }));
      } catch (err) {
        console.error('Errore caricamento missioni', err);
      }
    }

    function renderMissions(missions) {
      const grid = document.getElementById('missions-grid');
      grid.innerHTML = '';

      if (missions.length === 0) {
        grid.innerHTML = '<p class="text-muted">Nessuna missione trovata con questi filtri.</p>';
        return;
      }

      missions.forEach((m, index) => {
        const card = document.createElement('div');
        const isFirst = index === 0;
        card.className = isFirst ? 'card card-featured' : 'card';
        
        const ordinal = isFirst ? '<div class="ordinal-bg">01</div>' : '';
        
        card.innerHTML = `
          ${ordinal}
          <h3 class="card-title">${m.title}</h3>
          <div class="mb-2">
            <span class="tag tag-${m.difficulty}">${m.difficulty}</span>
            <span class="tag">${m.category}</span>
          </div>
          <p class="card-body mb-3">${m.description.substring(0, 80)}...</p>
          <div class="mb-2" style="font-size: 0.85rem; color: var(--accent-amber);">
            Punti: ${m.points} | ${m.location}
          </div>
          <a href="/mission-detail.html?id=${m.id}" class="btn btn-primary btn-block">Vedi missione →</a>
        `;
        grid.appendChild(card);
      });
    }

    document.addEventListener('DOMContentLoaded', async () => {
      user = await setupHeader();
      await loadMissions();

      document.getElementById('filter-category').addEventListener('change', loadMissions);
      document.getElementById('filter-difficulty').addEventListener('change', loadMissions);
    });
  </script>
  <script type="module" src="/js/map.js"></script>

  <footer class="container">
    <div>AMU &mdash; Roma, 2025</div>
    <div>Progetto universitario</div>
  </footer>
</body>

</html>
