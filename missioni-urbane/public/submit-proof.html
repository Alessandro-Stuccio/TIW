<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invia Prova - Agenzia Missioni Urbane</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>

<body>
  <header>
    <div class="container header-content">
      <div class="logo">
        AMU
      </div>
      <nav>
        <ul id="main-nav"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div style="max-width: 600px; margin: 0 auto;">
      <div class="card">
        <h2 class="card-title text-amber text-center mb-3" id="m-title">Invia la prova</h2>
        <div id="alert-container"></div>

        <form id="proof-form">
          <div class="form-group">
            <label class="form-label">Dettagli dell'operazione (opzionale)</label>
            <textarea id="proof_text" class="form-control" placeholder="Aggiungi una nota..."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Prova Fotografica (Opzionale se inserisci note)</label>
            <div id="drop-zone" class="drop-zone">
              <span class="drop-zone-text">Trascina qui l'immagine o clicca per selezionare</span>
              <input type="file" id="file-input" accept="image/*" class="hidden">
            </div>
            <div id="file-name" class="mt-1 text-green" style="font-size: 0.8rem;"></div>
          </div>

          <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <button type="submit" class="btn btn-primary btn-block">Invia la prova</button>
            <a href="/index.html" class="btn-link text-center">&larr; torna indietro</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script type="module">
    import { fetchAPI, setupHeader, showAlert } from './js/api.js';

    let missionId = null;
    let selectedFile = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const user = await setupHeader();
      if (!user) {
        window.location.href = '/login.html';
        return;
      }

      const urlParams = new URLSearchParams(window.location.search);
      missionId = urlParams.get('id');

      if (!missionId) {
        window.location.href = '/index.html';
      }

      setupDragAndDrop();
    });

    function setupDragAndDrop() {
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const fileNameDisplay = document.getElementById('file-name');

      dropZone.addEventListener('click', (e) => {
        if (e.target === fileInput) return;
        fileInput.click();
      });

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
          handleFile(e.dataTransfer.files[0]);
        }
      });

      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
          handleFile(e.target.files[0]);
        }
      });

      function handleFile(file) {
        if (!file.type.startsWith('image/')) {
          showAlert('alert-container', "Devi selezionare un'immagine valida.");
          return;
        }
        selectedFile = file;
        fileNameDisplay.textContent = `File selezionato: ${file.name}`;
      }
    }

    document.getElementById('proof-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const proofText = document.getElementById('proof_text').value;

      if (!proofText.trim() && !selectedFile) {
        showAlert('alert-container', "Devi fornire del testo o un'immagine.");
        return;
      }

      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Trasmissione in corso...';

      try {
        const formData = new FormData();
        if (proofText) formData.append('proof_text', proofText);
        if (selectedFile) formData.append('proof_image', selectedFile);

        await fetchAPI(`/completions/missions/${missionId}/submit`, {
          method: 'POST',
          body: formData
        });

        window.location.href = `/mission-detail.html?id=${missionId}`;
      } catch (err) {
        showAlert('alert-container', err.message);
        btn.disabled = false;
        btn.textContent = 'Invia la prova';
      }
    });
  </script>

  <footer class="container">
    <div>AMU &mdash; Roma, 2025</div>
    <div>Progetto universitario</div>
  </footer>
</body>

</html>
